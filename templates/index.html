<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillGap-AI | Analyse Resume</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-indigo: #235ef2;
            --brand-dark:   #163ea9;
            --light-bg:     #f5f7fb;
            --surface:      #ffffff;
            --slate-dark:   #172033;
            --text-muted:   #5f6b85;
            --border:       #d7deed;
            --shadow:       0 10px 30px rgba(26,43,77,0.09);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, rgba(35,94,242,0.11), transparent 28%),
                        linear-gradient(180deg,#f8faff 0%, var(--light-bg) 100%);
            color: var(--slate-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        /* ── Top bar ── */
        .topbar {
            width: 100%; max-width: 600px;
            display: flex; justify-content: space-between; align-items: center;
            gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
        }
        .brand {
            font-size: 14px; font-weight: 800; letter-spacing: 0.08em;
            text-transform: uppercase; color: var(--brand-indigo); text-decoration: none;
        }
        .top-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .nav-btn {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 8px 14px; border-radius: 999px;
            border: 1px solid var(--border); background: rgba(255,255,255,0.9);
            color: var(--slate-dark); text-decoration: none;
            font-size: 13px; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: border-color .15s, background .15s;
            white-space: nowrap;
        }
        .nav-btn:hover { border-color: var(--brand-indigo); background: #f0f5ff; }
        .nav-btn.primary { background: var(--brand-indigo); border-color: var(--brand-indigo); color: #fff; }
        .nav-btn.primary:hover { background: var(--brand-dark); }

        /* ── Card ── */
        .card {
            background: var(--surface); border-radius: 20px; padding: 32px;
            box-shadow: var(--shadow); width: 100%; max-width: 600px;
            border: 1px solid rgba(35,94,242,0.08);
        }
        .card-title {
            font-size: 28px; font-weight: 800; color: var(--brand-indigo); margin-bottom: 6px;
        }
        .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }

        /* ── Form ── */
        .field { margin-bottom: 18px; }
        .field label {
            display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; color: var(--slate-dark);
        }
        .field input[type="text"],
        .field select,
        .field textarea {
            width: 100%; padding: 11px 14px; font-size: 14px;
            border: 1px solid var(--border); border-radius: 10px;
            background: #fafbff; color: var(--slate-dark);
            font-family: inherit; transition: border-color .15s;
            outline: none;
        }
        .field input[type="text"]:focus,
        .field select:focus,
        .field textarea:focus { border-color: var(--brand-indigo); background: #fff; }
        .field textarea { height: 160px; resize: vertical; }
        .field input[type="file"] { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

        /* char counter */
        .char-row { display: flex; justify-content: flex-end; margin-top: 4px; }
        .char-count { font-size: 11px; color: var(--text-muted); }
        .char-count.warn { color: #d97706; }
        .char-count.over { color: #dc2626; }

        /* ── Submit btn ── */
        .submit-btn {
            width: 100%; padding: 14px; background: var(--brand-indigo); color: white;
            border: none; border-radius: 10px; font-weight: 700; font-size: 16px;
            cursor: pointer; margin-top: 6px; transition: opacity .2s, background .2s;
            font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .submit-btn:hover:not(:disabled) { background: var(--brand-dark); }
        .submit-btn:disabled { opacity: 0.65; cursor: not-allowed; }

        /* spinner inside button */
        .btn-spinner {
            display: none; width: 18px; height: 18px; border-radius: 50%;
            border: 2.5px solid rgba(255,255,255,0.4); border-top-color: #fff;
            animation: spin .75s linear infinite; flex: 0 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Alert ── */
        .alert {
            margin-bottom: 18px; padding: 12px 14px; border-radius: 10px;
            background: #fff7ed; border: 1px solid #fdba74;
            color: #9a3412; font-size: 14px; font-weight: 500;
        }

        /* ── Helper row ── */
        .helper-row {
            display: flex; justify-content: space-between; align-items: center;
            gap: 10px; margin-top: 14px; font-size: 13px; color: var(--text-muted); flex-wrap: wrap;
        }
        .helper-row a { color: var(--brand-indigo); text-decoration: none; font-weight: 600; }
        .helper-row a:hover { text-decoration: underline; }

        @media (max-width: 640px) {
            body { justify-content: flex-start; padding: 16px; }
            .card { padding: 22px; }
            .topbar { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <!-- Top bar -->
    <div class="topbar">
        <a class="brand" href="{{ url_for('index') }}">SkillGap-AI</a>
        <div class="top-actions">
            <!-- Back / Forward -->
            <button class="nav-btn" onclick="history.go(-1)" title="Back" aria-label="Go back">&#8592;</button>
            <button class="nav-btn" onclick="history.go(1)"  title="Forward" aria-label="Go forward">&#8594;</button>
            <a class="nav-btn" href="{{ url_for('explore') }}">Explore Roles</a>
            <a class="nav-btn" href="{{ url_for('learning_paths') }}">Learning Paths</a>
            <a class="nav-btn" href="{{ url_for('history') }}">History</a>
        </div>
    </div>

    <div class="card">
        <div class="card-title">🎓 SkillGap-AI</div>
        <p class="subtitle">Upload your resume and paste the job description to find your personalised skill gap and learning roadmap.</p>

        {% if error %}
        <div class="alert">⚠ {{ error }}</div>
        {% endif %}

        <form id="analyzeForm" action="/analyze" method="POST" enctype="multipart/form-data" novalidate>

            <div class="field">
                <label for="job_title">1. Target Job Title</label>
                <input type="text" id="job_title" name="job_title"
                       placeholder="e.g. Data Scientist / Backend Engineer"
                       maxlength="120" required
                       value="{{ request.form.get('job_title', '') }}">
            </div>

            <div class="field">
                <label for="role_type">2. Role Type Weighting</label>
                <select id="role_type" name="role_type">
                    <option value="technical">Technical Role (80% Hard Skills / 20% Soft Skills)</option>
                    <option value="management">Management Role (60% Hard Skills / 40% Soft Skills)</option>
                </select>
            </div>

            <div class="field">
                <label for="resume">3. Your Resume (PDF, max 10 MB)</label>
                <input type="file" id="resume" name="resume" accept=".pdf" required>
            </div>

            <div class="field">
                <label for="job_desc">4. Job Description</label>
                <textarea id="job_desc" name="job_desc"
                          placeholder="Paste the full job description here…"
                          maxlength="8000" required>{{ request.form.get('job_desc', '') }}</textarea>
                <div class="char-row">
                    <span class="char-count" id="descCounter">0 / 8000</span>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span class="btn-spinner" id="btnSpinner"></span>
                <span id="btnText">Analyse Match &amp; Find Gaps</span>
            </button>
        </form>

        <div class="helper-row">
            <span>PDF only · max 10 MB · takes 5–15 s</span>
            <a href="{{ url_for('explore') }}">Use a predefined job role →</a>
        </div>
    </div>

    <script>
        // ── Character counter ──
        const descEl    = document.getElementById('job_desc');
        const counterEl = document.getElementById('descCounter');
        function updateCounter() {
            const len = descEl.value.length;
            counterEl.textContent = len + ' / 8000';
            counterEl.className = 'char-count' + (len > 7500 ? ' over' : len > 6000 ? ' warn' : '');
        }
        descEl.addEventListener('input', updateCounter);
        updateCounter();

        // ── Loading spinner on submit ──
        document.getElementById('analyzeForm').addEventListener('submit', function(e) {
            const file     = document.getElementById('resume').files[0];
            const jobDesc  = descEl.value.trim();
            const jobTitle = document.getElementById('job_title').value.trim();

            // Client-side validation
            if (!file) { e.preventDefault(); alert('Please choose a PDF resume.'); return; }
            if (!jobDesc || jobDesc.length < 30) { e.preventDefault(); alert('Please enter a longer job description.'); return; }
            if (!jobTitle) { e.preventDefault(); alert('Please enter a job title.'); return; }

            // Show spinner
            const btn     = document.getElementById('submitBtn');
            const spinner = document.getElementById('btnSpinner');
            const txt     = document.getElementById('btnText');
            btn.disabled       = true;
            spinner.style.display = 'block';
            txt.textContent    = 'Analysing…';
        });
    </script>
</body>
</html>
