<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillGap-AI | Upload</title>
    <style>
        :root {
            --brand-indigo: #6366f1;
            --light-bg: #f8fafc;
            --slate-dark: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--light-bg);
            color: var(--slate-dark);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 700px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 36px;
            color: var(--brand-indigo);
            margin-bottom: 10px;
        }

        .subtitle {
            color: #64748b;
            margin-bottom: 40px;
        }

        textarea {
            width: 100%;
            height: 250px;
            padding: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin-top: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 18px;
            background: var(--brand-indigo);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h1>🎓 SkillGap-AI</h1>
            <p class="subtitle">Upload your resume and the job requirements to find your study list.</p>
            <form action="/analyze" method="POST" enctype="multipart/form-data">
                <label><b>1. Target Job Title</b></label>
                <input type="text" name="job_title" placeholder="e.g. Data Scientist / Frontend Developer" required
                    style="width: 100%; padding: 15px; border: 1px solid #e2e8f0; border-radius: 12px; margin-top: 8px; margin-bottom: 20px; box-sizing: border-box;">

                <label><b>2. Your Resume (PDF)</b></label><br>
                <input type="file" name="resume" accept=".pdf" required style="margin: 15px 0 30px 0;"><br>

                <label><b>3. Job Description</b></label>
                <textarea name="job_desc" placeholder="Paste the job requirements here..." required></textarea>
                <button type="submit">Analyze Match & Find Gaps</button>
            </form>
        </div>
    </div>
</body>

</html>
