<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillGap-AI | Upload</title>
    <style>
        :root {
            --brand-indigo: #6366f1;
            --light-bg: #f8fafc;
            --slate-dark: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--light-bg);
            color: var(--slate-dark);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 15px;
            box-sizing: border-box;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 28px;
            color: var(--brand-indigo);
            margin-bottom: 8px;
        }

        .subtitle {
            color: #64748b;
            margin-bottom: 25px;
            font-size: 14px;
        }

        label b {
            font-size: 14px;
            color: var(--slate-dark);
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 12px;
            font-size: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-top: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-top: 6px;
            margin-bottom: 15px;
            box-sizing: border-box;
            font-family: inherit;
        }

        input[type="file"] {
            margin: 10px 0 20px 0;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--brand-indigo);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h1>🎓 SkillGap-AI</h1>
            <p class="subtitle">Upload your resume and the job requirements to find your study list.</p>
            <form action="/analyze" method="POST" enctype="multipart/form-data">
                <label><b>1. Target Job Title</b></label>
                <input type="text" name="job_title" placeholder="e.g. Data Scientist / Frontend Developer" required>

                <label><b>2. Role Type Weighting</b></label>
                <select name="role_type">
                    <option value="technical">Technical Role (80% Hard / 20% Soft)</option>
                    <option value="management">Management Role (60% Hard / 40% Soft)</option>
                </select>

                <label><b>3. Your Resume (PDF)</b></label><br>
                <input type="file" name="resume" accept=".pdf" required><br>

                <label><b>4. Job Description</b></label>
                <textarea name="job_desc" placeholder="Paste the job requirements here..." required></textarea>
                <button type="submit">Analyze Match & Find Gaps</button>
            </form>
        </div>
    </div>
</body>

</html>
